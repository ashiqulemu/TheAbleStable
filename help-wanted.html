    <!-- popular_catagory_area_start  -->
    <div class="formData_area py-5" style="background-color: red;">
        <br>
        <br>
        <br>
        <br>
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="section_title mb-40 text-center">
                        <!-- <h3 class="high-school text-light">Help Wanted ? </h3> -->
                         <img src="./images/person-page.png" class="img-fluid" >
                    </div>
                </div>
            </div>
            <div class="row"> 
                <div class="col-lg-8 col-xl-8 col-md-8 mx-auto">
                    <form id="workerForm" class="p-4 form-contact rounded border">

                        <!-- Work Type -->
                        <div class=" row mb-3">
                            <div class="col-lg-12">
                                <label for="work_type" class="form-label">Type of Work <span
                                        class="text-danger">*</span></label>
                                <select class="form-select" id="work_type" name="work_type" required>
                                    <option value="">Select Work Type</option>
                                    <option value="Babysitting">Babysitting</option>
                                    <option value="Construction Help">Construction Help</option>
                                    <option value="Moving Items">Moving Items</option>
                                    <option value="Office Work">Office Work</option>
                                    <option value="Organizing">Organizing</option>
                                    <option value="Pet Sitting">Pet Sitting</option>
                                    <option value="Restaurant Work">Restaurant Work</option>
                                    <option value="Retail Work">Retail Work</option>
                                    <option value="Shopping Help">Shopping Help</option>
                                    <option value="Tutor">Tutor</option>
                                    <option value="Yard Work">Yard Work</option>
                                    <option value="General Helper">General Helper</option>
                                </select>
                            </div>
                        </div>


                        <div class="row mt-3">
                            <div class="col-lg-6">
                                <!-- Dates -->
                                <div class="mb-3">
                                    <label for="work_dates" class="form-label">Date(s) of Work <span
                                            class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="work_dates" name="work_dates"
                                        placeholder="Enter work date(s)" required>
                                </div>
                            </div>
                            <div class="col-lg-6">
                                <!-- Times -->
                                <div class="mb-3">
                                    <label for="work_times" class="form-label">Time(s) of Work <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="work_times" name="work_times"
                                        placeholder="Enter work time(s)" required>
                                </div>
                            </div>
                        </div>





                        <!-- Location -->
                        <div class="mb-3">
                            <label for="location" class="form-label">Location of Work <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="location" name="location" required>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Description of Work <span
                                    class="text-danger">*</span></label>
                            <textarea class="form-control" id="description" name="description" rows="6"
                                placeholder="Please be thorough in describing the work required." required></textarea>
                        </div>

                        <!-- Fee -->
                        <div class="mb-3">
                            <label for="fee" class="form-label">Fee Offered <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="fee" name="fee" required>
                        </div>

                        <hr>

                        <!-- Contact Name -->
                        <div class="mb-3">
                            <label for="contact_name" class="form-label">Contact Name <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="contact_name" name="contact_name" required>
                        </div>

                        <!-- Phone -->
                        <div class="mb-3">
                            <label for="contact_phone" class="form-label">Contact Phone <span
                                    class="text-danger">*</span></label>
                            <input type="tel" class="form-control" id="contact_phone" name="contact_phone" required>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="contact_email" class="form-label">Contact Email <span
                                    class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="contact_email" name="contact_email" required>
                        </div>

                        <!-- Best Time -->
                        <div class="mb-3">
                            <label for="best_time" class="form-label">Best Time to Contact <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="best_time" name="best_time" required>
                        </div>

                        <button type="submit" class="btn-form-submit">
                            Submit Request
                        </button>

                    </form>
                </div>

            </div>
